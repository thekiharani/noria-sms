name: CI

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

jobs:
  test:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]

    name: Python ${{ matrix.python }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

  verify:
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Required checks passed
        run: echo "All required CI checks passed."

  tag:
    needs: verify
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.bump.outputs.tag_name }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          BASE_VERSION=$(python - <<'PY'
          from pathlib import Path
          import re

          content = Path("pyproject.toml").read_text()
          match = re.search(r'(?m)^version = "(.*)"$', content)
          if match is None:
              raise SystemExit("Unable to find version in pyproject.toml")
          print(match.group(1))
          PY
          )

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          LINE_TAG_PREFIX="v${MAJOR}.${MINOR}."
          LATEST_LINE_TAG=$(git tag -l "${LINE_TAG_PREFIX}*" --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_LINE_TAG" ]; then
            NEW_VERSION="${BASE_VERSION}"
          else
            LATEST_PATCH="${LATEST_LINE_TAG##*.}"
            NEW_VERSION="${MAJOR}.${MINOR}.$((LATEST_PATCH + 1))"
          fi

          NEW_TAG="v${NEW_VERSION}"

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${NEW_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update pyproject version
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("pyproject.toml")
          content = path.read_text()
          version = "${{ steps.bump.outputs.version }}"
          match = re.search(r'(?m)^version = "(.*)"$', content)
          if match is None:
              raise SystemExit("Unable to find version in pyproject.toml")
          current = match.group(1)
          if current == version:
              print(f"pyproject.toml already has version {version}")
          else:
              updated = re.sub(
                  r'(?m)^version = ".*"$',
                  f'version = "{version}"',
                  content,
                  count=1,
              )
              path.write_text(updated)
          PY

      - name: Commit version bump and push release tag
        env:
          TAG_NAME: ${{ steps.bump.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore(release): ${TAG_NAME}" || true
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

  release:
    needs: tag
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.tag.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release already exists for ${TAG_NAME}"
          else
            gh release create "${TAG_NAME}" --generate-notes
          fi

  publish:
    needs: [tag, release]
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout release tag
        env:
          TAG_NAME: ${{ needs.tag.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git checkout "${TAG_NAME}"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
